<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plataforma Educativa Games</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-content">
      <p class="tag">Aprender brincando</p>
      <h1>Plataforma Educativa Games</h1>
      <p class="subtitle">
        Jogos educativos com desafios ludicos para criancas e adolescentes.
      </p>
      <button id="startButton">Explorar jogos</button>
    </div>
  </header>

  <main class="container">
    <section class="section-header">
      <h2>Jogos em destaque</h2>
      <p>Escolha um jogo para comecar sua jornada de aprendizagem.</p>
    </section>

    <section class="games-grid" id="gamesGrid"></section>
  </main>

  <script src="js/data/games.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
